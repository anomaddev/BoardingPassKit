name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./packages/node/package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($VERSION) does not match packages/node/package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing boarding-pass-kit@$PKG_VERSION"

      - name: Log publish version
        if: github.event_name == 'workflow_dispatch'
        run: |
          PKG_VERSION=$(node -p "require('./packages/node/package.json').version")
          echo "Manual publish of boarding-pass-kit@$PKG_VERSION"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify NPM_TOKEN is configured
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish -w boarding-pass-kit --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
